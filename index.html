<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="A curated collection of context-engineered prompts for Google NotebookLM.">
    
    <link rel="preconnect" href="https://esm.sh" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PromptLib">
    <meta name="mobile-web-app-capable" content="yes">

    <title>NotebookLM Prompt Library</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><path d='M8 10h16M8 16h10M8 22h13' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>" type="image/svg+xml">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap&font-display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/index.css">
    <style>
      body {
        background-color: #f8fafc;
        margin: 0;
        padding: 0;
      }
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f8fafc;
      }
      #root:empty::before {
        content: "";
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      #root:empty::after {
        content: "Initializing Library...";
        font-family: 'Inter', system-ui, sans-serif;
        color: #64748b;
        font-size: 0.875rem;
        font-weight: 500;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #debug-info {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        color: #cbd5e1;
        pointer-events: none;
      }
      /* Update Notification Toast */
      #pwa-update-toast {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 12px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        z-index: 100;
        align-items: center;
        gap: 12px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        animation: slide-up 0.3s ease-out;
      }
      #pwa-update-toast.show {
        display: flex;
      }
      @keyframes slide-up {
        from { transform: translate(-50%, 100%); opacity: 0; }
        to { transform: translate(-50%, 0); opacity: 1; }
      }
      .update-btn {
        background: #2563eb;
        border: none;
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 12px;
      }
      .update-btn:hover {
        background: #1d4ed8;
      }
      .dismiss-btn {
        background: transparent;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        padding: 4px;
      }
      .dismiss-btn:hover {
        color: white;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <div id="debug-info"></div>
    
    <!-- PWA Update Toast -->
    <div id="pwa-update-toast">
      <span>New version available</span>
      <button class="update-btn" onclick="window.location.reload()">Refresh</button>
      <button class="dismiss-btn" onclick="document.getElementById('pwa-update-toast').classList.remove('show')">✕</button>
    </div>

    <script>
      // Diagnostic timeout
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          console.warn('[Bootstrap] Root is still empty after 5s. Check console for module errors.');
          const debug = document.getElementById('debug-info');
          if (debug) debug.innerText = 'Module loading stalled. Check DevTools Console.';
        }
      }, 5000);

      // Robust PWA Service Worker Registration & Update Logic
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // Register SW with explicit absolute path
            const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            console.log('[PWA] Service Worker registered.');

            // Helper to show the toast
            const showUpdateToast = () => {
              const toast = document.getElementById('pwa-update-toast');
              if (toast) toast.classList.add('show');
            };

            // 1. Check if there's a waiting worker immediately (e.g. from previous load)
            if (reg.waiting) {
              console.log('[PWA] A waiting worker was found. Prompting update.');
              showUpdateToast();
            }

            // 2. Listen for new workers installing
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              if (!installingWorker) return;

              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // Update available
                    console.log('[PWA] New content is available; please refresh.');
                    showUpdateToast();
                  } else {
                    console.log('[PWA] Content is cached for offline use.');
                  }
                }
              };
            };

            // 3. Poll for updates periodically (every 1 hour)
            setInterval(() => {
              reg.update();
            }, 60 * 60 * 1000);
            
            // 4. Check for updates when the user returns to the tab
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    console.debug('[PWA] Tab visible, checking for updates...');
                    reg.update();
                }
            });

          } catch (err) {
            console.debug('[PWA] SW Registration skipped/failed:', err.message);
          }
        });
        
        // Ensure controller changes reload the page if needed, or handle smoothly
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
           if (!refreshing) {
               console.log('[PWA] Controller changed.');
               // We usually don't auto-reload here to prevent disrupting user work, 
               // but the toast 'Refresh' button triggers window.location.reload()
               refreshing = true;
           }
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
